<html>
    <head>
<style>
html, body {
    height: 100%;
}

.layout {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
html, body {
    height: 100%;
}

body{
    font-family: Arial, sans-serif;
    background:#afc8cc;
    margin:0;

    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;

}

.topbar {
    height: 60px;
    background: #f5f8fb;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-weight: 600;
    color: #1e3a5f;
    gap: 15px;
    text-decoration: none;
    font-size: 25px;
}

.nav-links {
    display: flex;
    gap: 50px;
    justify-content: flex-end;
}
.nav-links a {
    font-size: 20px;
    font-weight: 600;
    color: #1e3a5f;
    text-decoration: none;  /* remove underline */
}

.nav-links a:hover {
    color: #0f2a45;
}

.user-area {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logout-btn {
    padding: 6px 12px;
    border: none;
    background: #1e88e5;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
}


#review{
    max-width:1100px;
    width:70%;
    margin:40px auto;
    flex:1;
}

.review-box{
    background:white;
    padding:25px 30px;
    margin-bottom:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.review-box h3{
    margin-bottom:10px;
    color:#333;
}

.review-box p{
    font-size:16px;
    margin:6px 0;
}

.correct{
    color:#2ecc71;
    font-weight:600;
}

.footer {
    background-color: #1e3a5f;
    color: #ffffff;
    padding: 10px;
    margin-top: auto;
    width:99%;
}

.footer-content {
    flex: 1; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.footer-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.footer-links a:hover{
    text-decoration:underline;
}

</style>
    </head>
    <body>
<div class="layout">
  
    <div class="topbar">
    <div class="logo">QuizMaster</div>
    <div class="nav-links">
    <a href="selection.html">Home</a>
    <!-- <a href="instruction.html">instruction</a> -->
    <a href="result.html">Result Page</a>
    <a href="progress.html">your progress</a>
    </div>
    <div class="user-area">
        <span>Guest User</span>
        <a href="index.html"><button class="logout-btn">Logout</button></a>
    </div>
</div>


    <div id="review"></div>

<script>

let questions = JSON.parse(localStorage.getItem("questions"));
let userAnswers = JSON.parse(localStorage.getItem("userAnswers"));

let container = document.getElementById("review");

questions.forEach((q, index) => {

  let userAns = userAnswers[index];

  let correctAns = q.options[q.answer];

  let userText = userAns !== null ? q.options[userAns] : "Not Attempted";

  let color;

  if(userAns === null){
    color = "gray";
  }
  else if(userAns === q.answer){
    color = "green";
  }
  else{
    color = "red";
  }

  container.innerHTML += `
    <div class="review-box">
      <h3>Q${index+1}. ${q.question}</h3>
      <p style="color:${color}">Your Answer: ${userText}</p>
      <p class="correct">Correct Answer: ${correctAns}</p>
    </div>
  `;
});

</script>

<footer class="footer">
    <div class="footer-content">
        <p>© 2026 QuizMaster. All Rights Reserved.</p>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Help</a>
            <a href="#">Privacy Policy</a>
        </div>
    </div>
</footer>
</body>
</html>
